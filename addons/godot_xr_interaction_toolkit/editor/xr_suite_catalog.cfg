[catalog]
schema=1
repository="https://github.com/davtamay/godot-xr-suite"

[deployments.web]
display_name="WebXR"
summary="Browser VR/AR with an adaptive WebGL or WebGPU export."
targets=PackedStringArray("web")
base_packages=PackedStringArray("xr.runtime")

[deployments.native]
display_name="Universal APK"
summary="One native OpenXR APK for Quest 3 and Android XR headsets."
targets=PackedStringArray("native")
base_packages=PackedStringArray("xr.runtime", "export.universal_apk")

[deployments.both]
display_name="Web + APK"
summary="One project and scene graph with both browser and native exports."
targets=PackedStringArray("web", "native")
base_packages=PackedStringArray("xr.runtime", "export.universal_apk")

[capabilities.interactions]
display_name="Interactions"
summary="Rig, input, grabbing, UI, and locomotion."
required=true
default_enabled=true
targets=PackedStringArray("web", "native")
packages=PackedStringArray("xr.interaction")
packages_web=PackedStringArray()
packages_native=PackedStringArray()

[capabilities.hands]
display_name="Enhanced Hands"
summary="Realistic meshes, gestures, recording, and microgestures."
required=false
default_enabled=true
targets=PackedStringArray("web", "native")
packages=PackedStringArray("xr.hands")
packages_web=PackedStringArray()
packages_native=PackedStringArray()

[capabilities.perception]
display_name="Scene Understanding"
summary="Depth occlusion and room mesh, with a provider selected per runtime."
required=false
default_enabled=true
targets=PackedStringArray("web", "native")
packages=PackedStringArray("xr.perception")
packages_web=PackedStringArray("xr.perception.webxr")
packages_native=PackedStringArray()

[capabilities.webgpu]
display_name="WebGPU renderer (experimental)"
summary="Off: lean WebGL-only exports with no shader baking. On: WebGPU-capable exports with automatic shader baking and WebGL fallback."
required=false
default_enabled=false
targets=PackedStringArray("web")
packages=PackedStringArray()
packages_web=PackedStringArray("export.webgpu")
packages_native=PackedStringArray()

[packages.xr.runtime]
display_name="XR Runtime Kit"
summary="Shared rig, WebXR/OpenXR sessions, input modality, and controller models."
layer="foundation"
folder="godot_webxr_kit"
manifest="res://addons/godot_webxr_kit/xr_package.cfg"
probe="res://addons/godot_webxr_kit/xr_prefab.tscn"
targets=PackedStringArray("web", "native")
requires=PackedStringArray("xr.interaction")
requires_web=PackedStringArray()
requires_native=PackedStringArray()
runtime_footprint="Runtime"

[packages.xr.interaction]
display_name="XR Interaction Toolkit"
summary="Runtime-neutral grabbing, rays, touch, UI, locomotion, and XR Suite authoring."
layer="foundation"
folder="godot_xr_interaction_toolkit"
manifest="res://addons/godot_xr_interaction_toolkit/xr_package.cfg"
probe="res://addons/godot_xr_interaction_toolkit/plugin.cfg"
targets=PackedStringArray("web", "native")
requires=PackedStringArray()
requires_web=PackedStringArray()
requires_native=PackedStringArray()
runtime_footprint="Runtime + editor tools"

[packages.xr.hands]
display_name="XR Hands"
summary="Tracked hand meshes, authorable gestures, recording, and microgestures."
layer="capability"
folder="godot_xr_hands"
manifest="res://addons/godot_xr_hands/xr_package.cfg"
probe="res://addons/godot_xr_hands/plugin.cfg"
targets=PackedStringArray("web", "native")
requires=PackedStringArray("xr.interaction")
requires_web=PackedStringArray()
requires_native=PackedStringArray()
runtime_footprint="Runtime"

[packages.xr.perception]
display_name="XR Scene Understanding"
summary="Neutral depth and room-mesh managers with capability-selected native providers."
layer="capability"
folder="godot_xr_scene_understanding"
manifest="res://addons/godot_xr_scene_understanding/xr_package.cfg"
probe="res://addons/godot_xr_scene_understanding/plugin.cfg"
targets=PackedStringArray("web", "native")
requires=PackedStringArray()
requires_web=PackedStringArray()
requires_native=PackedStringArray("openxr.vendors")
runtime_footprint="Runtime"

[packages.xr.perception.webxr]
display_name="WebXR Perception Provider"
summary="Optional browser provider for depth, mesh, light estimation, hit tests, and anchors."
layer="provider"
folder="godot_webxr_scene_understanding"
manifest="res://addons/godot_webxr_scene_understanding/xr_package.cfg"
probe="res://addons/godot_webxr_scene_understanding/providers/environment_depth_provider.gd"
targets=PackedStringArray("web")
requires=PackedStringArray("xr.perception", "xr.runtime")
requires_web=PackedStringArray()
requires_native=PackedStringArray()
runtime_footprint="Web runtime only"

[packages.export.webgpu]
display_name="WebGPU Export"
summary="WebGPU export toggle and bake anchors for runtime-created shaders and text."
layer="tooling"
folder="godot_webgpu"
manifest="res://addons/godot_webgpu/xr_package.cfg"
probe="res://addons/godot_webgpu/plugin.cfg"
targets=PackedStringArray("web")
requires=PackedStringArray()
requires_web=PackedStringArray()
requires_native=PackedStringArray()
runtime_footprint="Editor tooling + optional bake anchors"
editor_plugin="godot_webgpu"

[packages.export.universal_apk]
display_name="Universal XR APK"
summary="Editor/export tooling for one arm64 OpenXR APK targeting Quest and Android XR."
layer="deployment"
folder="godot_universal_xr_apk"
manifest="res://addons/godot_universal_xr_apk/xr_package.cfg"
probe="res://addons/godot_universal_xr_apk/plugin.cfg"
targets=PackedStringArray("native")
requires=PackedStringArray("openxr.vendors")
requires_web=PackedStringArray()
requires_native=PackedStringArray()
runtime_footprint="Editor/export only"
editor_plugin="godot_universal_xr_apk"

[packages.openxr.vendors]
display_name="Godot OpenXR Vendors"
summary="Official native OpenXR vendor extension library used by the universal APK and native perception."
layer="provider"
folder="godotopenxrvendors"
manifest=""
probe="res://addons/godotopenxrvendors/plugin.gdextension"
targets=PackedStringArray("native")
requires=PackedStringArray()
requires_web=PackedStringArray()
requires_native=PackedStringArray()
runtime_footprint="Native GDExtension"
source_url="https://github.com/GodotVR/godot_openxr_vendors"
