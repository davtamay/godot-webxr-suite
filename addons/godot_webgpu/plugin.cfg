[plugin]

name="Godot WebGPU (web)"
description="Standalone tooling for shipping a Godot web export on the WebGPU backend: a clear WebGPU export toggle (auto-bakes shaders, hides the raw Shader Baker, shows an in-panel status line + one-click setup popup), and a BakeAnchor node for declaring runtime-built materials so their shaders bake ahead of time. No dependencies - works in any web project, XR or not."
author="OSE"
version="1.1.0"
script="plugin.gd"
