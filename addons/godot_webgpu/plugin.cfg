[plugin]

name="Godot WebGPU (web)"
description="Standalone tooling for shipping a Godot web export on the WebGPU backend: a one-checkbox WebGPU adaptive-build export toggle, and a BakeAnchor node for declaring runtime-built materials so their shaders bake ahead of time. No dependencies - works in any web project, XR or not."
author="OSE"
version="1.0.0"
script="plugin.gd"
