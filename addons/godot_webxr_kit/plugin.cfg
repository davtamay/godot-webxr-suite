[plugin]

name="Godot WebXR Kit"
description="WebXR platform layer: session bootstrap with the webxr_feature_provider contract, WebXRInputAdapter, custom HTML shell with browser bridges, and browser-capability probe. Pure GDScript. Requires godot_xr_interaction_toolkit. Scene understanding (room mesh, occlusion, depth sensing) lives in godot_webxr_scene_understanding."
author="OSE"
version="1.12.0"
script="plugin.gd"
