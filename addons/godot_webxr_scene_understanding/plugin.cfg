[plugin]

name="Godot WebXR Scene Understanding"
description="Room mesh detection, semantic labels, real-world occlusion, depth sensing, environmental light estimation, hit testing, and anchors for WebXR sessions. Pure GDScript runtime with no hard dependencies; sample scenes compose godot_webxr_kit and optionally godot_xr_interaction_toolkit. Nodes declare their own WebXR session features via the webxr_feature_provider contract."
author="OSE"
version="1.10.0"
script="plugin.gd"
