[plugin]

name="Godot WebXR Scene Understanding"
description="Room mesh detection, semantic scene labels, real-world occlusion, and live depth sensing for WebXR sessions. Pure GDScript runtime with no hard dependencies; the sample demo scene composes godot_webxr_kit and godot_xr_interaction_toolkit. Nodes declare their own WebXR session features via the webxr_feature_provider contract."
author="OSE"
version="1.5.2"
script="plugin.gd"
